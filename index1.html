<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style1.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    <title>Document</title>
</head>
<body>
    <!-- Envolpe Screen -->
    <div id="envelope-container">
        <img src="imgs/envelope.png" alt="Envelope" id="envelope">
        <p>Letter for You ♡</p>
    </div> <!-- envelope-container -->

    <!-- Letter Screen -->
    <div id="letter-container">
        <div class="letter-window">
            <h1 id="letter-title">Will you be my Valetine?</h1>
            <img src="imgs/love.gif" alt="cat" id="letter-cat" class="cat">
            <video id="video"  style="display: none;" ></video>


            <div class="buttons" id="letter-buttons">
                <img src="imgs/yes.png" alt="Yes" class="btn yes-btn">

                <div class="no-wrapper">
                    <img src="imgs/no.png" alt="No" class="btn no-btn">
                </div>
            </div><!-- buttons -->

        </div><!-- letter-window -->
        <p class="final-text" id="final-text"  style="display: none">
            <strong>Valentine Date:</strong>Meow Restaurat at 7pm. Dress fancy!
        </p>
    </div><!-- letter-container -->
    <script src="script1.js"></script>
</body>
</html>
